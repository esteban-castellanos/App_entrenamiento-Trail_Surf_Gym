<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7F77DD">
<meta name="description" content="Plan de entrenamiento Surf, Gym y Trail con periodización, timers y registro de pesos.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Entreno">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Entrenamiento — Esteban</title>
<style>
  :root {
    --surf: #1D9E75;
    --surf-light: #E1F5EE;
    --surf-dark: #085041;
    --gym: #7F77DD;
    --gym-light: #EEEDFE;
    --gym-dark: #3C3489;
    --trail: #BA7517;
    --trail-light: #FAEEDA;
    --trail-dark: #633806;
    --rest: #888780;
    --rest-light: #F1EFE8;
    --rest-dark: #2C2C2A;
    --mob: #D85A30;
    --mob-light: #FAECE7;
    --mob-dark: #4A1B0C;
    --bg: #f8f7f4;
    --card: #ffffff;
    --border: rgba(0,0,0,0.08);
    --text: #1a1a1a;
    --muted: #666660;
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 16px 10px; position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .app-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; cursor: pointer; color: var(--text); }
  .month-nav button:active { background: var(--bg); }
  .month-label { font-size: 15px; font-weight: 600; min-width: 140px; text-align: center; }

  /* LEGEND */
  .legend { display: flex; gap: 10px; flex-wrap: wrap; padding: 0 16px 10px; }
  .leg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--muted); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; }

  /* WEEK LABELS */
  .week-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 0 12px; margin-bottom: 4px; }
  .week-day-label { text-align: center; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0; }

  /* CALENDAR GRID */
  .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; padding: 0 12px 12px; }
  .cal-day { min-height: 56px; border-radius: var(--radius-sm); background: var(--card); border: 1px solid var(--border); padding: 4px; cursor: pointer; transition: transform 0.1s; position: relative; overflow: hidden; }
  .cal-day:active { transform: scale(0.97); }
  .cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
  .cal-day.today { border-color: var(--gym); border-width: 2px; }
  .cal-day-num { font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 3px; }
  .cal-day.today .cal-day-num { color: var(--gym); }
  .cal-pill { font-size: 9px; font-weight: 600; border-radius: 3px; padding: 2px 4px; margin-bottom: 2px; line-height: 1.2; }
  .pill-surf { background: var(--surf-light); color: var(--surf-dark); }
  .pill-gym { background: var(--gym-light); color: var(--gym-dark); }
  .pill-trail { background: var(--trail-light); color: var(--trail-dark); }
  .pill-rest { background: var(--rest-light); color: var(--rest-dark); }
  .pill-mob { background: var(--mob-light); color: var(--mob-dark); }
  .done-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surf); position: absolute; top: 4px; right: 4px; }

  /* BOTTOM SHEET */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
  .overlay.open { display: block; }
  .sheet { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-radius: 20px 20px 0 0; z-index: 201; max-height: 90vh; overflow-y: auto; padding-bottom: 32px; transform: translateY(100%); transition: transform 0.3s ease; }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 12px auto 0; }
  .sheet-header { padding: 14px 44px 10px 16px; border-bottom: 1px solid var(--border); position: relative; }
  .sheet-date { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .sheet-title { font-size: 18px; font-weight: 700; }
  .sheet-body { padding: 14px 16px; }

  /* SESSION BLOCKS */
  .session-block { background: var(--bg); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; }
  .session-block-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .session-block.surf .session-block-title { color: var(--surf); }
  .session-block.gym .session-block-title { color: var(--gym); }
  .session-block.trail .session-block-title { color: var(--trail); }
  .session-block.rest .session-block-title { color: var(--rest); }
  .session-block.mob .session-block-title { color: var(--mob); }

  /* EXERCISE ROWS */
  .ex-item { border-bottom: 1px solid var(--border); }
  .ex-item:last-child { border-bottom: none; }
  .ex-row { display: flex; align-items: flex-start; justify-content: space-between; padding: 8px 0 4px; gap: 8px; }
  .ex-item:last-child .ex-row { padding-bottom: 8px; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 14px; font-weight: 500; margin-bottom: 1px; }
  .ex-sub { font-size: 11px; color: var(--muted); }
  .ex-target { font-size: 12px; color: var(--gym-dark); background: var(--gym-light); padding: 3px 8px; border-radius: 10px; white-space: nowrap; font-weight: 600; }
  .ex-target.trail-tag { color: var(--trail-dark); background: var(--trail-light); }
  .ex-target.surf-tag { color: var(--surf-dark); background: var(--surf-light); }

  /* SET TRACKER */
  .set-tracker { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 0 0 10px; flex-wrap: wrap; }
  .set-dots { display: flex; gap: 5px; flex-wrap: wrap; }
  .set-dot { width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--border); background: var(--card); font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; flex-shrink: 0; }
  .set-dot.done { background: var(--gym); border-color: var(--gym); color: white; }
  .set-dot:active { transform: scale(0.92); }
  .set-meta { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .set-count { font-size: 12px; font-weight: 700; color: var(--gym-dark); min-width: 32px; }
  .set-count.all-done { color: var(--surf); }
  .set-plus { border: none; background: var(--gym-light); color: var(--gym-dark); border-radius: 16px; padding: 6px 11px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .set-plus:active { opacity: 0.8; }
  .set-done-label { font-size: 11px; color: var(--surf); font-weight: 600; }
  .set-reset { border: none; background: none; color: var(--muted); font-size: 11px; cursor: pointer; text-decoration: underline; padding: 0; }

  /* LOG SECTION */
  .log-section { margin-top: 12px; }
  .log-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .log-textarea { width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); resize: none; min-height: 80px; }
  .log-textarea:focus { outline: none; border-color: var(--gym); }
  .log-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .log-input { flex: 1; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); }
  .log-input:focus { outline: none; border-color: var(--gym); }
  .save-btn { width: 100%; background: var(--gym); color: white; border: none; border-radius: var(--radius-sm); padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .save-btn:active { opacity: 0.85; }
  .saved-note { font-size: 13px; color: var(--muted); background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 8px; white-space: pre-wrap; }

  /* TRAIL INFO */
  .trail-card { border: 1px solid var(--trail-light); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 8px; }
  .trail-name { font-size: 15px; font-weight: 700; color: var(--trail-dark); margin-bottom: 6px; }
  .trail-stats { display: flex; gap: 16px; }
  .trail-stat { }
  .trail-stat-val { font-size: 16px; font-weight: 700; color: var(--text); }
  .trail-stat-label { font-size: 11px; color: var(--muted); }
  .trail-diff { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 10px; margin-top: 8px; }
  .diff-1 { background: #E1F5EE; color: #085041; }
  .diff-2 { background: #FAEEDA; color: #633806; }
  .diff-3 { background: #FAECE7; color: #712B13; }
  .diff-4 { background: #FCEBEB; color: #501313; }

  /* WEEK SUMMARY */
  .week-summary { padding: 0 12px 12px; }
  .week-sum-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .week-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .week-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .week-card-val { font-size: 18px; font-weight: 700; }
  .week-card-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* TABS */
  .tabs { display: flex; align-items: center; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .tab { flex: 1; text-align: center; padding: 10px 4px; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab.active { color: var(--gym); border-bottom-color: var(--gym); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .close-btn { position: absolute; top: 10px; right: 12px; background: var(--bg); border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 20px; cursor: pointer; color: var(--muted); display: flex; align-items: center; justify-content: center; z-index: 10; -webkit-tap-highlight-color: transparent; }
  .close-btn:active { background: var(--border); }

  /* COMPLETION BUTTONS */
  .complete-section { margin-bottom: 14px; }
  .complete-title { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .complete-btns { display: flex; flex-direction: column; gap: 8px; }
  .complete-btn { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border-radius: var(--radius-sm); border: 2px solid var(--border); background: var(--card); cursor: pointer; transition: all 0.15s; }
  .complete-btn:active { transform: scale(0.98); }
  .complete-btn.done-surf { border-color: var(--surf); background: var(--surf-light); }
  .complete-btn.done-gym { border-color: var(--gym); background: var(--gym-light); }
  .complete-btn.done-trail { border-color: var(--trail); background: var(--trail-light); }
  .complete-btn.done-mob { border-color: var(--mob); background: var(--mob-light); }
  .complete-btn.done-rest { border-color: var(--rest); background: var(--rest-light); }
  .complete-btn-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .complete-btn-check { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
  .complete-btn.done-surf .complete-btn-check { background: var(--surf); border-color: var(--surf); color: white; }
  .complete-btn.done-gym .complete-btn-check { background: var(--gym); border-color: var(--gym); color: white; }
  .complete-btn.done-trail .complete-btn-check { background: var(--trail); border-color: var(--trail); color: white; }
  .complete-btn.done-mob .complete-btn-check { background: var(--mob); border-color: var(--mob); color: white; }
  .complete-btn.done-rest .complete-btn-check { background: var(--rest); border-color: var(--rest); color: white; }

  /* CALENDAR COMPLETION INDICATORS */
  .cal-checks { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; }
  .cal-check { width: 5px; height: 5px; border-radius: 50%; }

  /* SETTINGS */
  .settings-btn { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 13px; cursor: pointer; color: var(--muted); }
  .settings-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .settings-row label { font-size: 12px; color: var(--muted); }
  .settings-row input[type="date"] { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 8px; font-size: 13px; font-family: inherit; background: var(--bg); }
  .data-btns { display: flex; gap: 8px; margin-top: 8px; }
  .data-btn { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px; font-size: 12px; cursor: pointer; color: var(--text); }
  .duration-badge { font-size: 11px; color: var(--muted); background: var(--bg); padding: 3px 8px; border-radius: 10px; margin-left: auto; }

  /* REST TIMER */
  .rest-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .rest-bar-label { font-size: 12px; padding: 5px 8px; border-radius: 6px; flex: 1; min-width: 140px; }
  .rest-btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .rest-btn { border: none; border-radius: 20px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .rest-btn:active { opacity: 0.8; transform: scale(0.97); }

  .timer-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; background: var(--text); color: white; padding: 14px 16px 20px; box-shadow: 0 -4px 20px rgba(0,0,0,0.2); }
  .timer-bar.active { display: block; }
  .timer-bar.done { background: var(--surf); }
  .timer-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .timer-label { font-size: 12px; opacity: 0.85; font-weight: 500; }
  .timer-display { font-size: 42px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; line-height: 1; }
  .timer-actions { display: flex; gap: 8px; margin-top: 10px; }
  .timer-action { flex: 1; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25); color: white; border-radius: var(--radius-sm); padding: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .timer-action:active { background: rgba(255,255,255,0.25); }
  .timer-action.primary { background: var(--gym); border-color: var(--gym); }

  /* GPS TRACKER */
  .gps-panel { background: var(--trail-light); border: 1px solid var(--trail-light); border-radius: var(--radius-sm); padding: 12px; margin: 12px 0; }
  .gps-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; text-align: center; }
  .gps-stat-val { font-size: 20px; font-weight: 700; color: var(--trail-dark); font-variant-numeric: tabular-nums; }
  .gps-stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .gps-btns { display: flex; gap: 8px; }
  .gps-btn { flex: 1; border: none; border-radius: var(--radius-sm); padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .gps-btn.start { background: var(--trail); color: white; }
  .gps-btn.pause { background: var(--card); color: var(--trail-dark); border: 1px solid var(--trail); }
  .gps-btn.stop { background: var(--trail-dark); color: white; }
  .gps-status { font-size: 11px; color: var(--trail-dark); margin-top: 8px; text-align: center; }
  .gps-link { display: block; font-size: 12px; color: var(--gym); margin-top: 8px; text-align: center; text-decoration: none; }

  /* NOTIFICATIONS SETTINGS */
  .notif-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .notif-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .notif-status { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="app-title">Entrenamiento 🏄</div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button onclick="changeMonth(1)">›</button>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--surf)"></div>Surf</div>
    <div class="leg"><div class="leg-dot" style="background:var(--gym)"></div>Gym</div>
    <div class="leg"><div class="leg-dot" style="background:var(--trail)"></div>Trail</div>
    <div class="leg"><div class="leg-dot" style="background:var(--mob)"></div>Movilidad</div>
    <div class="leg"><div class="leg-dot" style="background:var(--rest)"></div>Descanso</div>
    <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
  </div>
  <div id="settingsPanel" style="display:none;padding:0 16px 10px">
    <div class="settings-row">
      <label for="programStart">Inicio del programa:</label>
      <input type="date" id="programStart" onchange="setProgramStart(this.value)">
    </div>
    <div class="log-label" style="margin-top:4px">Notificaciones</div>
    <div class="notif-status" id="notifStatus">Sin permiso</div>
    <button class="data-btn" style="width:100%;margin-bottom:8px" onclick="requestNotificationPermission()">🔔 Activar notificaciones</button>
    <div class="notif-row">
      <label class="notif-toggle"><input type="checkbox" id="dailyReminder" onchange="saveNotifSettings()"> Recordatorio matutino</label>
      <input type="time" id="dailyReminderTime" value="06:30" onchange="saveNotifSettings()" style="border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 8px;font-size:13px;background:var(--bg)">
    </div>
    <div class="notif-row">
      <label class="notif-toggle"><input type="checkbox" id="timerNotif" checked onchange="saveNotifSettings()"> Aviso al terminar descanso</label>
    </div>
    <div class="data-btns">
      <button class="data-btn" onclick="exportForAI()">🤖 Exportar para AI</button>
      <button class="data-btn" onclick="exportData()">📤 Backup completo</button>
      <button class="data-btn" onclick="importData()">📥 Importar</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4">
      <strong>Para AI:</strong> descarga .json + .md + .jsonl → subilos a Google Drive en carpeta <em>Entrenamiento/</em>
    </div>
    <button class="data-btn" id="installBtn" style="display:none;width:100%;margin-top:8px" onclick="installApp()">📲 Instalar app</button>
    <div id="iosInstallHint" style="display:none;font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4">
      En iPhone/iPad: tocá <strong>Compartir</strong> → <strong>Agregar a pantalla de inicio</strong>.
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">
  </div>
</div>

<div class="week-days">
  <div class="week-day-label">Lun</div>
  <div class="week-day-label">Mar</div>
  <div class="week-day-label">Mié</div>
  <div class="week-day-label">Jue</div>
  <div class="week-day-label">Vie</div>
  <div class="week-day-label">Sáb</div>
  <div class="week-day-label">Dom</div>
</div>

<div class="calendar" id="calendar"></div>

<div class="week-summary" id="weekSummary"></div>

<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <button class="close-btn" type="button" aria-label="Cerrar" onclick="closeSheet()">×</button>
    <div class="sheet-date" id="sheetDate"></div>
    <div class="sheet-title" id="sheetTitle"></div>
  </div>
  <div class="sheet-body" id="sheetBody"></div>
</div>

<div class="timer-bar" id="timerBar">
  <div class="timer-top">
    <div class="timer-label" id="timerLabel">Descanso</div>
    <div class="timer-label" id="timerStatus"></div>
  </div>
  <div class="timer-display" id="timerDisplay">3:00</div>
  <div class="timer-actions">
    <button class="timer-action" onclick="adjustRestTimer(15)">+15 seg</button>
    <button class="timer-action" onclick="adjustRestTimer(-15)">−15 seg</button>
    <button class="timer-action primary" onclick="stopRestTimer()">Cancelar</button>
  </div>
</div>

<script>
// ===== PERIODIZATION ENGINE =====

// Each 4-week block has different sets/reps prescription for main lifts
// Block 1 (weeks 1-4): Adaptation — moderate volume, learn movement
// Block 2 (weeks 5-8): Hypertrophy — higher volume
// Block 3 (weeks 9-12): Strength — heavier, lower reps
// Block 4+ (weeks 13+): repeats from block 2 with heavier weights

function getBlock(weekNum) {
  const b = Math.floor(weekNum / 4) % 3;
  return b; // 0=adaptation, 1=hypertrophy, 2=strength
}

function getBlockLabel(weekNum) {

// ===== SET TRACKER =====
function parseSetCount(setsStr) {
  if (!setsStr) return null;
  const m = String(setsStr).match(/^(\d+)\s*[×x]/i);
  return m ? parseInt(m[1], 10) : null;
}

function getTrackId(ex) {
  return ex.key || ex.name.toLowerCase().replace(/[^a-z0-9]/g, '_').slice(0, 24);
}

const HEAVY_LIFT_KEYS = ['squat', 'deadlift', 'bench', 'military', 'pullups', 'dips', 'snatch', 'cleanjerk', 'pushjerk'];

function getRestForExercise(blockName, ex) {
  if (blockName === 'Bloque Olímpico') return 180;
  if (blockName === 'Bloque Pliométrico') return 120;
  if (blockName === 'Bloque de Fuerza') return HEAVY_LIFT_KEYS.includes(ex.key) ? 180 : 90;
  if (blockName === 'Core') return 60;
  return 0;
}

function renderSetTrackerHtml(key, trackId, total, done, restSec, exName) {
  const safeName = exName.replace(/'/g, "\\'");
  const dots = [];
  for (let i = 1; i <= total; i++) {
    dots.push(`<button class="set-dot${i <= done ? ' done' : ''}" onclick="setSeriesCount('${key}','${trackId}',${i},${total},${restSec},'${safeName}')">${i}</button>`);
  }
  const allDone = done >= total;
  return `<div class="set-tracker" id="sets_${key}_${trackId}">
    <div class="set-dots">${dots.join('')}</div>
    <div class="set-meta">
      <span class="set-count${allDone ? ' all-done' : ''}">${done}/${total}</span>
      ${allDone
        ? '<span class="set-done-label">✓ Listo</span>'
        : `<button class="set-plus" onclick="markSeriesDone('${key}','${trackId}',${total},${restSec},'${safeName}')">+1 serie →</button>`}
      ${done > 0 ? `<button class="set-reset" onclick="resetSeries('${key}','${trackId}',${total},${restSec},'${safeName}')">reset</button>` : ''}
    </div>
  </div>`;
}

function refreshSetTracker(key, trackId, total, restSec, exName) {
  const el = document.getElementById(`sets_${key}_${trackId}`);
  if (!el) return;
  const done = (savedData[key] || {}).setProgress?.[trackId] || 0;
  el.outerHTML = renderSetTrackerHtml(key, trackId, total, done, restSec, exName);
}

function markSeriesDone(key, trackId, total, restSec, exName) {
  if (!savedData[key]) savedData[key] = {};
  if (!savedData[key].setProgress) savedData[key].setProgress = {};
  const current = savedData[key].setProgress[trackId] || 0;
  if (current >= total) return;
  savedData[key].setProgress[trackId] = current + 1;
  localStorage.setItem('esteban_training', JSON.stringify(savedData));
  refreshSetTracker(key, trackId, total, restSec, exName);
  const newCount = current + 1;
  if (restSec > 0 && newCount < total) {
    startRestTimer(restSec, `${exName} — serie ${newCount}/${total}`);
  } else if (newCount >= total) {
    showSavedToast(`✓ ${exName} — todas las series`);
  }
}

function setSeriesCount(key, trackId, count, total, restSec, exName) {
  if (!savedData[key]) savedData[key] = {};
  if (!savedData[key].setProgress) savedData[key].setProgress = {};
  const current = savedData[key].setProgress[trackId] || 0;
  const next = (current === count) ? count - 1 : count;
  savedData[key].setProgress[trackId] = Math.max(0, Math.min(total, next));
  localStorage.setItem('esteban_training', JSON.stringify(savedData));
  refreshSetTracker(key, trackId, total, restSec, exName);
}

function resetSeries(key, trackId, total, restSec, exName) {
  if (!savedData[key]) savedData[key] = {};
  if (!savedData[key].setProgress) savedData[key].setProgress = {};
  savedData[key].setProgress[trackId] = 0;
  localStorage.setItem('esteban_training', JSON.stringify(savedData));
  refreshSetTracker(key, trackId, total, restSec, exName);
}

// Suggest weight based on last 4 weeks of logged weights (chronological)
function suggestWeight(exKey) {
  if (!exKey) return null;
  const today = new Date();
  const entries = [];
  for (let w = 1; w <= 4; w++) {
    const d = new Date(today);
    d.setDate(d.getDate() - w * 7);
    for (let offset = -3; offset <= 3; offset++) {
      const check = new Date(d);
      check.setDate(check.getDate() + offset);
      const key = dateKey(check.getFullYear(), check.getMonth(), check.getDate());
      const weights = (savedData[key] || {}).weights || {};
      if (weights[exKey] != null && weights[exKey] !== '') {
        entries.push({ date: check.getTime(), kg: parseFloat(weights[exKey]) });
      }
    }
  }
  // Backward compat: old logs used generic 'olympic' key
  if (entries.length === 0 && ['pushjerk','snatch','cleanjerk'].includes(exKey)) {
    return suggestWeight('olympic');
  }
  if (entries.length === 0) return null;
  entries.sort((a, b) => a.date - b.date);
  const values = entries.map(e => e.kg);
  const last = values[values.length - 1];
  if (values.length >= 3) {
    const last3 = values.slice(-3);
    const stagnated = last3.every(v => v === last3[0]);
    if (stagnated) return { kg: last, stagnated: true };
  }
  return { kg: last + 2.5, stagnated: false };
}

// Detect stagnation for lifts trained on a given gym day
function checkStagnation(dow) {
  const liftsByDay = {
    1: [
      { key: 'pushjerk', label: 'Push jerk' },
      { key: 'bench', label: 'Press de banca' },
      { key: 'military', label: 'Press militar' },
    ],
    3: [
      { key: 'snatch', label: 'Snatch' },
      { key: 'cleanjerk', label: 'Clean & jerk' },
      { key: 'squat', label: 'Front squat' },
      { key: 'deadlift', label: 'Peso muerto' },
    ],
    5: [
      { key: 'cleanjerk', label: 'Clean & jerk' },
      { key: 'pullups', label: 'Dominadas' },
      { key: 'military', label: 'Press militar' },
    ],
  };
  const alerts = [];
  for (const lift of (liftsByDay[dow] || [])) {
    const s = suggestWeight(lift.key);
    if (s && s.stagnated) alerts.push(lift.label);
  }
  return alerts;
}

function loadProgramStartDate() {
  const saved = localStorage.getItem('esteban_program_start');
  if (saved) return new Date(saved + 'T12:00:00');
  // Default: first Monday on or before today
  const d = new Date(currentDate);
  const day = d.getDay();
  const diff = day === 0 ? 6 : day - 1;
  d.setDate(d.getDate() - diff);
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

const MONTHS_ES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const DAYS_ES = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

function dateKey(y, m, d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }

function getWeekNumber(date) {
  const diff = Math.floor((date - programStartDate) / (7 * 24 * 60 * 60 * 1000));
  return Math.max(0, diff);
}

function getDayPlan(date) {
  const dow = date.getDay(); // 0=Sun, 1=Mon...
  return WEEK_PLAN[dow] || null;
}

function getTrailForDate(date) {
  const dow = date.getDay();
  const weekNum = getWeekNumber(date);
  const idx = Math.min(Math.floor(weekNum / 2) * 2 + (weekNum % 2), 7);
  if (dow === 2) return TRAIL_PROGRESSION.martes[idx];
  if (dow === 6) return TRAIL_PROGRESSION.sabado[idx];
  return null;
}

// ===== RENDER CALENDAR =====
function renderCalendar() {
  const label = document.getElementById('monthLabel');
  label.textContent = `${MONTHS_ES[viewMonth]} ${viewYear}`;

  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  // Adjust so week starts on Monday (0=Mon ... 6=Sun)
  const startOffset = (firstDay === 0) ? 6 : firstDay - 1;

  for (let i = 0; i < startOffset; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    cal.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = dateKey(viewYear, viewMonth, d);
    const plan = getDayPlan(date);
    const isToday = (d === currentDate.getDate() && viewMonth === currentDate.getMonth() && viewYear === currentDate.getFullYear());

    const div = document.createElement('div');
    div.className = 'cal-day' + (isToday ? ' today' : '');
    div.onclick = () => openSheet(date);

    const dayData = savedData[key] || {};
    const completions = dayData.completions || {};

    let html = `<div class="cal-day-num">${d}</div>`;

    if (plan) {
      if (plan.surf) html += `<div class="cal-pill pill-surf">Surf</div>`;
      if (plan.type === 'gym') html += `<div class="cal-pill pill-gym">${plan.label}</div>`;
      else if (plan.type === 'trail') html += `<div class="cal-pill pill-trail">${plan.label}</div>`;
      else if (plan.type === 'rest') html += `<div class="cal-pill pill-rest">Descanso</div>`;
      else if (plan.type === 'mob') html += `<div class="cal-pill pill-mob">Movilidad</div>`;

      // Completion dots
      let dots = '';
      if (plan.surf && completions.surf) dots += `<div class="cal-check" style="background:var(--surf)"></div>`;
      if (plan.type === 'gym' && completions.gym) dots += `<div class="cal-check" style="background:var(--gym)"></div>`;
      if (plan.type === 'trail' && completions.trail) dots += `<div class="cal-check" style="background:var(--trail)"></div>`;
      if (plan.type === 'mob' && completions.mob) dots += `<div class="cal-check" style="background:var(--mob)"></div>`;
      if (plan.type === 'rest' && completions.rest) dots += `<div class="cal-check" style="background:var(--rest)"></div>`;
      if (dots) html += `<div class="cal-checks">${dots}</div>`;
    }

    div.innerHTML = html;
    cal.appendChild(div);
  }

  renderWeekSummary();
}

      </div>

        <div class="week-card-val" style="color:var(--gym)">${gymCount}</div>
        <div class="week-card-label">Gym</div>
      </div>
      <div class="week-card">
        <div class="week-card-val" style="color:var(--trail)">${trailCount}</div>
        <div class="week-card-label">Trail</div>
      </div>
    </div>
  `;
}

// ===== SHEET =====
function openSheet(date) {
  const plan = getDayPlan(date);
  if (!plan) return;

  const key = dateKey(date.getFullYear(), date.getMonth(), date.getDate());
  const saved = savedData[key] || {};

  document.getElementById('sheetDate').textContent = `${DAYS_ES[date.getDay()]} ${date.getDate()} de ${MONTHS_ES[date.getMonth()]} ${date.getFullYear()}`;

  let title = '';
  if (plan.type === 'gym') title = `Gym — ${plan.label}`;
  else if (plan.type === 'trail') title = plan.label === 'Trail corto' ? 'Trail — Martes corto' : 'Trail — Sábado largo';
  else if (plan.type === 'rest') title = 'Descanso activo';
  else if (plan.type === 'mob') title = 'Movilidad + Stretching';
  document.getElementById('sheetTitle').textContent = title;

  let body = '';

  // SURF block always (except Sunday)
  if (plan.surf) {
    body += `<div class="session-block surf">
      <div class="session-block-title">🏄 Surf — Mañana</div>
      <div style="font-size:13px; color:var(--muted)">Sesión principal del día. Siempre antes del gym o trail.</div>
    </div>`;
  }

  // COMPLETION BUTTONS
  const completions = saved.completions || {};
  body += `<div class="complete-section">
    <div class="complete-title">¿Completaste hoy?</div>
    <div class="complete-btns">`;

  if (plan.surf) {
    const done = completions.surf;
    body += `<div class="complete-btn ${done ? 'done-surf' : ''}" onclick="toggleComplete('${key}','surf')">
      <span class="complete-btn-label">🏄 Surf</span>
      <span class="complete-btn-check">${done ? '✓' : ''}</span>
    </div>`;
  }
  if (plan.type === 'gym') {
    const done = completions.gym;
    body += `<div class="complete-btn ${done ? 'done-gym' : ''}" onclick="toggleComplete('${key}','gym')">
      <span class="complete-btn-label">💪 Gym — ${plan.label}</span>
      <span class="complete-btn-check">${done ? '✓' : ''}</span>
    </div>`;
  }
  if (plan.type === 'trail') {
    const done = completions.trail;
    body += `<div class="complete-btn ${done ? 'done-trail' : ''}" onclick="toggleComplete('${key}','trail')">
      <span class="complete-btn-label">🏃 ${plan.label}</span>
      <span class="complete-btn-check">${done ? '✓' : ''}</span>
    </div>`;
  }
  if (plan.type === 'mob') {
    const done = completions.mob;
    body += `<div class="complete-btn ${done ? 'done-mob' : ''}" onclick="toggleComplete('${key}','mob')">
      <span class="complete-btn-label">🧘 Movilidad</span>
      <span class="complete-btn-check">${done ? '✓' : ''}</span>
    </div>`;
  }
  if (plan.type === 'rest') {
    const done = completions.rest;
    body += `<div class="complete-btn ${done ? 'done-rest' : ''}" onclick="toggleComplete('${key}','rest')">
      <span class="complete-btn-label">😴 Descanso activo</span>
      <span class="complete-btn-check">${done ? '✓' : ''}</span>
    </div>`;
  }

  body += `</div></div><hr style="border:none;border-top:1px solid var(--border);margin:4px 0 14px">`;

  // GYM
  if (plan.type === 'gym' && plan.gym) {
    const weekNum = getWeekNumber(date);
    const dow = date.getDay();
    const block = getBlock(weekNum);
    const blockLabel = getBlockLabel(weekNum);
    const blockColors = ['var(--surf)', 'var(--gym)', 'var(--trail)'];
    const accSet = getAccessorySet(weekNum);
    const stagnated = checkStagnation(dow);
    const SESSION_DURATION = { 1: 70, 3: 80, 5: 75 };
    const duration = SESSION_DURATION[dow] || 75;

    body += `<div class="tabs">
      <div class="tab active" onclick="switchTab(this,'plan')">Programa</div>
      <div class="tab" onclick="switchTab(this,'log')">Registrar pesos</div>
      <span class="duration-badge">~${duration} min</span>
    </div>`;

    // Block indicator
    body += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:10px 12px;background:var(--bg);border-radius:var(--radius-sm)">
      <div style="width:8px;height:8px;border-radius:50%;background:${blockColors[block]};flex-shrink:0"></div>
      <div>
        <span style="font-size:12px;font-weight:700;color:${blockColors[block]}">Bloque ${block+1} — ${blockLabel}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:6px">Semana ${weekNum+1} del programa</span>
      </div>
    </div>`;

    // Stagnation alert
    if (stagnated.length > 0) {
      body += `<div style="background:#FAEEDA;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:12px;font-size:13px;color:#633806">
        ⚠️ Estancamiento detectado en: <strong>${stagnated.join(', ')}</strong>. Considerá cambiar el estímulo o deload esta semana.

    // Plan tab
    body += `<div class="tab-content active" id="tab-plan">`;

    // Build dynamic exercise list based on day
    let dynamicBlocks = [];

    if (dow === 1) { // Lunes — Push
      dynamicBlocks = [
        { name: 'Entrada en calor', exercises: [
          { name: 'Trote suave o bici', sets: '3 min', tag: '', key: '' },
          { name: 'Rotaciones hombro con banda', sets: '10 reps c/lado', tag: '', key: '' },
          { name: 'Flexiones suaves', sets: '2 × 10', tag: '', key: '' },
          { name: 'Press con barra vacía', sets: '2 × 8', tag: '', key: '' },
        ]},
        { name: 'Bloque Olímpico', exercises: [
          { name: 'Push jerk / Split jerk', sets: getPrescription('pushjerk', weekNum), tag: 'surf', key: 'pushjerk' },
        ]},
        { name: 'Bloque Pliométrico', exercises: [
          { name: 'Plyo push-ups', sets: '4 × 6', tag: 'surf', key: '' },
          { name: 'Med ball chest pass a pared', sets: '3 × 10', tag: 'surf', key: '' },
        ]},
        { name: 'Bloque de Fuerza', exercises: [
          { name: 'Press de banca con mancuernas', sets: getPrescription('bench', weekNum), tag: 'surf', key: 'bench' },
          { name: 'Fondos en paralelas con peso', sets: getPrescription('dips', weekNum), tag: 'surf', key: 'dips' },
          { name: 'Press militar con mancuernas', sets: getPrescription('military', weekNum), tag: 'surf', key: 'military' },
          { name: getAccessory('push_acc', weekNum).name, sets: getPrescription(getAccessory('push_acc', weekNum).key, weekNum), tag: '', key: getAccessory('push_acc', weekNum).key },
        ]},
        { name: 'Core', exercises: [
          { name: 'Pallof press con cable', sets: getPrescription('core', weekNum) + ' c/lado', tag: 'surf', key: '' },
          { name: 'Ab wheel', sets: '3 × 8–10', tag: '', key: '' },
          { name: 'Plancha con deslizamiento', sets: '3 × 30–40 seg', tag: '', key: '' },
        ]},
        { name: 'Movilidad final', exercises: [
          { name: 'Estiramiento pecho en pared', sets: '30 seg c/lado', tag: '', key: '' },
          { name: 'Apertura torácica foam roller', sets: '1 min', tag: '', key: '' },
          { name: 'Estiramiento tríceps', sets: '30 seg c/lado', tag: '', key: '' },
        ]},
      ];
    } else if (dow === 3) { // Miércoles — Piernas
      const legsAcc = getAccessory('legs', weekNum);
      const legsVol = getAccessory('legs_vol', weekNum);
      dynamicBlocks = [
        { name: 'Entrada en calor', exercises: [
          { name: 'Trote suave', sets: '3 min', tag: '', key: '' },
          { name: 'Rotaciones cadera y hombro con palo', sets: '10 reps', tag: '', key: '' },
          { name: 'Overhead squat con palo', sets: '2 × 10', tag: '', key: '' },
          { name: 'Snatch con barra vacía', sets: '3 × 5', tag: '', key: '' },
        ]},
        { name: 'Bloque Olímpico', exercises: [
          { name: 'Snatch', sets: getPrescription('snatch', weekNum), tag: 'surf', key: 'snatch' },
          { name: 'Clean & jerk / Power clean', sets: getPrescription('cleanjerk', weekNum), tag: 'surf', key: 'cleanjerk' },
        ]},
        { name: 'Bloque Pliométrico', exercises: [
          { name: 'Box jumps', sets: '4 × 5 (máx potencia)', tag: 'trail', key: '' },
          { name: 'Single leg hops', sets: '3 × 8 c/lado', tag: 'trail', key: '' },
          { name: 'Broad jumps', sets: '3 × 5', tag: 'trail', key: '' },
        ]},
        { name: 'Bloque de Fuerza', exercises: [
          { name: 'Front squat', sets: getPrescription('frontsquat', weekNum), tag: 'trail', key: 'squat' },
          { name: 'Peso muerto rumano', sets: getPrescription('deadlift', weekNum), tag: 'trail', key: 'deadlift' },
          { name: legsAcc.name, sets: getPrescription(legsAcc.key, weekNum), tag: 'trail', key: legsAcc.key },
          { name: legsVol.name, sets: getPrescription(legsVol.key, weekNum), tag: 'trail', key: legsVol.key },
          { name: 'Elevaciones de gemelos', sets: getPrescription('calves', weekNum), tag: 'trail', key: 'calves' },
        ]},
        { name: 'Core', exercises: [
          { name: 'Wood chop con cable', sets: getPrescription('core', weekNum) + ' c/lado', tag: 'surf', key: '' },
          { name: 'Dead bug', sets: '3 × 10 c/lado', tag: '', key: '' },
          { name: 'Plancha frontal', sets: '2 × 40 seg', tag: '', key: '' },
        ]},
        { name: 'Movilidad final', exercises: [
          { name: 'Paloma en el suelo', sets: '45 seg c/lado', tag: '', key: '' },
          { name: 'Estiramiento cuádriceps', sets: '30 seg c/pierna', tag: '', key: '' },
          { name: 'Apertura torácica en suelo', sets: '1 min', tag: '', key: '' },
        ]},
      ];
    } else if (dow === 5) { // Viernes — Pull
      const pullAcc = getAccessory('pull', weekNum);
      dynamicBlocks = [
        { name: 'Entrada en calor', exercises: [
          { name: 'Remo en máquina', sets: '3 min', tag: '', key: '' },
          { name: 'Rotaciones hombro con banda', sets: '10 reps c/lado', tag: '', key: '' },
          { name: 'Dominadas agarre neutro', sets: '2 × 5 suaves', tag: '', key: '' },
          { name: 'Facepull liviano', sets: '2 × 10', tag: '', key: '' },
        ]},
        { name: 'Bloque Olímpico', exercises: [
          { name: 'Clean & jerk', sets: getPrescription('cleanjerk', weekNum), tag: 'surf', key: 'cleanjerk' },
        ]},
        { name: 'Bloque Pliométrico', exercises: [
          { name: 'Plyo push-ups', sets: '4 × 6', tag: 'surf', key: '' },
          { name: 'Medicine ball slam', sets: '3 × 8', tag: 'surf', key: '' },
          { name: 'Lanzamiento med. ball a pared', sets: '3 × 10', tag: 'surf', key: '' },
        ]},
        { name: 'Bloque de Fuerza', exercises: [
          { name: 'Dominadas con peso', sets: getPrescription('pullups', weekNum), tag: 'surf', key: 'pullups' },
          { name: pullAcc.name, sets: getPrescription(pullAcc.key, weekNum), tag: 'surf', key: pullAcc.key },
          { name: 'Press militar con barra', sets: getPrescription('military', weekNum), tag: 'surf', key: 'military' },
          { name: 'Facepull con cable', sets: getPrescription('facepull', weekNum), tag: 'surf', key: 'facepull' },
          { name: 'Curl de bíceps', sets: '3 × 12', tag: 'surf', key: '' },
        ]},
        { name: 'Core', exercises: [
          { name: 'Wood chop con cable', sets: getPrescription('core', weekNum) + ' c/lado', tag: 'surf', key: '' },
          { name: 'Dead bug', sets: '3 × 10 c/lado', tag: '', key: '' },
          { name: 'Ab wheel', sets: '3 × 8–10', tag: '', key: '' },
        ]},
        { name: 'Movilidad final', exercises: [
          { name: 'Posición fetal en suelo', sets: '1 min', tag: '', key: '' },
          { name: 'Apertura torácica foam roller', sets: '1 min', tag: '', key: '' },
          { name: 'Estiramiento bíceps en pared', sets: '30 seg c/lado', tag: '', key: '' },
        ]},
      ];
    }

    // Rest time per block type
    const REST_TIMES = {
      'Entrada en calor':  null,
      'Bloque Olímpico':   { label: 'Descanso entre series: 3 min', color: 'var(--surf-dark)', bg: 'var(--surf-light)', btnColor: 'var(--surf-dark)', btnBg: 'var(--surf-light)', timers: [{ sec: 180, label: '▶ 3 min' }] },
      'Bloque Pliométrico':{ label: 'Descanso entre series: 2 min', color: '#3C3489', bg: '#EEEDFE', btnColor: '#3C3489', btnBg: '#EEEDFE', timers: [{ sec: 120, label: '▶ 2 min' }] },
      'Bloque de Fuerza':  { label: 'Squat/muerto: 2–3 min · Accesorios: 90 seg', color: 'var(--trail-dark)', bg: 'var(--trail-light)', btnColor: 'var(--trail-dark)', btnBg: 'var(--trail-light)', timers: [{ sec: 180, label: '▶ 3 min' }, { sec: 90, label: '▶ 90 seg' }] },
      'Core':              { label: 'Descanso entre series: 60 seg', color: 'var(--muted)', bg: 'var(--bg)', btnColor: 'var(--muted)', btnBg: 'var(--rest-light)', timers: [{ sec: 60, label: '▶ 60 seg' }] },
      'Movilidad final':   null,
    };

    const setProgress = saved.setProgress || {};

    for (const blk of dynamicBlocks) {
      const rest = REST_TIMES[blk.name];
      body += `<div class="session-block gym"><div class="session-block-title">${blk.name}</div>`;
      if (rest) {
        const timerBtns = rest.timers.map(t =>
          `<button class="rest-btn" style="background:${rest.btnBg};color:${rest.btnColor}" onclick="startRestTimer(${t.sec},'${blk.name} — ${t.label.replace('▶ ','')}')">${t.label}</button>`
        ).join('');
        body += `<div class="rest-bar">
          <div class="rest-bar-label" style="background:${rest.bg};color:${rest.color}">⏱ ${rest.label}</div>
          <div class="rest-btns">${timerBtns}</div>
        </div>`;
      }
      for (const ex of blk.exercises) {
        const tagLabel = ex.tag === 'surf' ? '🏄 ' : ex.tag === 'trail' ? '🏃 ' : '';
        let weightHint = '';
        if (ex.key) {
          const sug = suggestWeight(ex.key);
          if (sug) {
            const color = sug.stagnated ? '#BA7517' : 'var(--surf-dark)';
            const bg = sug.stagnated ? '#FAEEDA' : 'var(--surf-light)';
            const icon = sug.stagnated ? '⚠️' : '↑';
            weightHint = `<div style="font-size:11px;padding:2px 7px;border-radius:8px;background:${bg};color:${color};margin-top:3px">${icon} ${sug.kg} kg sugerido</div>`;
          }
        }
        const totalSets = parseSetCount(ex.sets);
        const trackId = getTrackId(ex);
        const doneSets = setProgress[trackId] || 0;
        const restSec = totalSets ? getRestForExercise(blk.name, ex) : 0;
        const setTracker = totalSets
          ? renderSetTrackerHtml(key, trackId, totalSets, doneSets, restSec, ex.name)
          : '';
        body += `<div class="ex-item">
          <div class="ex-row">
            <div class="ex-info">
              <div class="ex-name">${tagLabel}${ex.name}</div>
              ${weightHint}
            </div>
            <div class="ex-target">${ex.sets}</div>
          </div>
          ${setTracker}
        </div>`;
      }
      body += `</div>`;
    }

    if (accSet === 1) {
      body += `<div style="font-size:12px;color:var(--muted);padding:8px 0;border-top:1px solid var(--border);margin-top:4px">🔄 Rotación B de accesorios activa — semana ${weekNum+1}</div>`;
    } else {
      body += `<div style="font-size:12px;color:var(--muted);padding:8px 0;border-top:1px solid var(--border);margin-top:4px">🔄 Rotación A de accesorios activa — semana ${weekNum+1}</div>`;
    }

    body += `</div>`;

    // Log tab — build exercise list from the session's weighted blocks only
    const savedWeights = saved.weights || {};
    const savedNote = saved.note || '';

    // Collect exercises with weight keys from olympic and strength blocks only
    const weightedBlockNames = ['Bloque Olímpico', 'Bloque de Fuerza'];
    const logExercises = [];
    const seenKeys = new Set();

    for (const blk of dynamicBlocks) {
      if (!weightedBlockNames.includes(blk.name)) continue;
      for (const ex of blk.exercises) {
        if (!ex.key) continue;
        const logKey = ex.key;
        if (!seenKeys.has(logKey)) {
          seenKeys.add(logKey);
          logExercises.push({ key: logKey, label: ex.name, block: blk.name });
        }
      }
    }

    body += `<div class="tab-content" id="tab-log">`;

    let currentBlock = '';
    for (const ex of logExercises) {
      if (ex.block !== currentBlock) {
        currentBlock = ex.block;
        body += `<div class="log-label" style="margin-top:${currentBlock === logExercises[0].block ? '0' : '12px'}">${currentBlock}</div>`;
      }
      const sug = suggestWeight(ex.key);
      const phText = sug ? (sug.stagnated ? '⚠ estancado' : `sug: ${sug.kg} kg`) : 'kg';
      body += `<div class="log-row">
        <div style="font-size:13px;flex:1;color:var(--muted)">${ex.label}</div>
        <input class="log-input" style="max-width:100px" type="number" placeholder="${phText}" id="w_${ex.key}" value="${savedWeights[ex.key] || ''}">
      </div>`;
    }

    body += `<div class="log-label" style="margin-top:12px">Notas del día</div>
      <textarea class="log-textarea" id="noteInput" placeholder="¿Cómo estuvo la sesión? Energía, técnica, sensaciones...">${savedNote}</textarea>
      <button class="save-btn" onclick="saveDay('${key}', ${JSON.stringify(logExercises.map(e=>e.key))})">Guardar sesión ✓</button>
    </div>`;
  }

  // TRAIL
  if (plan.type === 'trail') {
    const trail = getTrailForDate(date);
    const weekNum = getWeekNumber(date) + 1;
    if (trail) {
      const diffClass = `diff-${trail.diff}`;
      body += `<div class="session-block trail">
        <div class="session-block-title">🏃 Trail — Semana ${weekNum}</div>
        <div class="trail-card">
          <div class="trail-name">${trail.name}</div>
          <div class="trail-stats">
            <div class="trail-stat"><div class="trail-stat-val">${trail.km} km</div><div class="trail-stat-label">Distancia</div></div>
            <div class="trail-stat"><div class="trail-stat-val">${trail.desnivel} m</div><div class="trail-stat-label">Desnivel</div></div>
          </div>
          <div class="trail-diff ${diffClass}">${trail.diffLabel}</div>
          <div style="font-size:12px;color:var(--muted);margin-top:8px">${trail.note}</div>
        </div>
        <div style="font-size:13px;color:var(--muted);margin-top:4px">
          ${date.getDay() === 2 ? 'Ritmo zona 2 — conversacional. Cuidado con las bajadas.' : 'Ritmo libre. Disfrutá el terreno.'}
        </div>
      </div>`;
    }

    body += `<div class="log-label" style="margin-top:12px">GPS en vivo</div>
      <div class="gps-panel" id="gpsPanel">
        <div class="gps-stats">
          <div><div class="gps-stat-val" id="gpsTime">0:00</div><div class="gps-stat-label">Tiempo</div></div>
          <div><div class="gps-stat-val" id="gpsDist">0.00</div><div class="gps-stat-label">km recorridos</div></div>
          <div><div class="gps-stat-val" id="gpsPace">--:--</div><div class="gps-stat-label">min/km</div></div>
        </div>
        <div class="gps-btns">
          <button class="gps-btn start" id="gpsStartBtn" onclick="startGps('${key}')">▶ Iniciar</button>
          <button class="gps-btn pause" id="gpsPauseBtn" onclick="pauseGps()" style="display:none">⏸ Pausar</button>
          <button class="gps-btn stop" id="gpsStopBtn" onclick="stopGps('${key}')" style="display:none">⏹ Detener</button>
        </div>
        <div class="gps-status" id="gpsStatus">Tocá Iniciar para registrar tu trail con GPS</div>
        <a class="gps-link" id="gpsMapLink" href="#" target="_blank" rel="noopener" style="display:none">Ver última posición en mapa</a>
      </div>
      <div class="log-label" style="margin-top:12px">Registrar salida</div>
      <div class="log-row">
        <div style="font-size:13px;flex:1;color:var(--muted)">Tiempo total</div>
        <input class="log-input" style="max-width:110px" type="text" placeholder="ej: 42 min" id="w_time" value="${(savedData[key]||{}).time||''}">
      </div>
      <div class="log-label" style="margin-top:8px">Notas</div>
      <textarea class="log-textarea" id="noteInput" placeholder="¿Cómo estuvo? Terreno, sensaciones, clima...">${(savedData[key]||{}).note||''}</textarea>
      <button class="save-btn" onclick="saveTrail('${key}')">Guardar salida ✓</button>`;
  }

  // REST
  if (plan.type === 'rest') {
    body += `<div class="session-block rest">
      <div class="session-block-title">Tarde libre — recuperación</div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Sin entrenamiento</div><div class="ex-sub">El jueves es el buffer después del miércoles exigente. Respetarlo es parte del plan.</div></div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Opciones suaves</div><div class="ex-sub">Caminata, stretching liviano, foam roller</div></div></div>
    </div>
    <div class="log-label">Notas</div>
    <textarea class="log-textarea" id="noteInput" placeholder="¿Cómo te sentiste? ¿Algo que quieras recordar?">${(savedData[key]||{}).note||''}</textarea>
    <button class="save-btn" onclick="saveNote('${key}')">Guardar nota ✓</button>`;
  }

  // MOBILITY
  if (plan.type === 'mob') {
    body += `<div class="session-block mob">
      <div class="session-block-title">🧘 Movilidad + Stretching</div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Foam roller — piernas completas</div></div><div class="ex-target">10 min</div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Paloma en suelo (cadera)</div></div><div class="ex-target">60 seg c/lado</div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Estiramiento isquiotibiales</div></div><div class="ex-target">45 seg c/lado</div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Apertura torácica</div></div><div class="ex-target">2 min</div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Rotaciones de hombro suaves</div></div><div class="ex-target">10 reps c/lado</div></div>
      <div class="ex-row"><div class="ex-info"><div class="ex-name">Yoga o stretching libre</div></div><div class="ex-target">15–20 min</div></div>
    </div>

// ===== REST TIMER =====
let restTimerId = null;
let restRemaining = 0;
let restLabel = '';

function formatTimer(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function updateTimerDisplay() {
  const bar = document.getElementById('timerBar');
  const display = document.getElementById('timerDisplay');
  const label = document.getElementById('timerLabel');
  const status = document.getElementById('timerStatus');
  if (!bar) return;
  display.textContent = formatTimer(Math.max(0, restRemaining));
  label.textContent = restLabel;
  status.textContent = restRemaining > 0 ? 'Descansando…' : '';
  bar.classList.toggle('done', restRemaining === 0 && bar.classList.contains('active'));
}

function playTimerDone() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 0.15, 0.3].forEach((delay) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.3;
      osc.start(ctx.currentTime + delay);
      osc.stop(ctx.currentTime + delay + 0.1);
    });
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
  if (getNotifSettings().timerNotif) {
    showNotification('⏱ Descanso terminado', restLabel || 'Siguiente serie');
  }
}

function stopRestTimer() {
  if (restTimerId) clearInterval(restTimerId);
  restTimerId = null;
  restRemaining = 0;
  const bar = document.getElementById('timerBar');
  const sheet = document.getElementById('sheet');
  if (bar) {
    bar.classList.remove('active', 'done');
    document.getElementById('timerDisplay').textContent = '0:00';
    document.getElementById('timerStatus').textContent = '';
  }
  if (sheet) sheet.style.paddingBottom = '32px';
}

function finishRestTimer() {
  if (restTimerId) clearInterval(restTimerId);
  restTimerId = null;
  restRemaining = 0;
  updateTimerDisplay();
  document.getElementById('timerDisplay').textContent = '¡Listo!';
  document.getElementById('timerStatus').textContent = 'Siguiente serie';
  playTimerDone();
  setTimeout(() => {
    if (!restTimerId) stopRestTimer();
  }, 2500);
}

function startRestTimer(seconds, label) {
  stopRestTimer();
  restRemaining = seconds;
  restLabel = label;
  const bar = document.getElementById('timerBar');
  const sheet = document.getElementById('sheet');
  bar.classList.add('active');
  bar.classList.remove('done');
  if (sheet) sheet.style.paddingBottom = '150px';
  updateTimerDisplay();
  restTimerId = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      finishRestTimer();
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function adjustRestTimer(delta) {
  if (!restTimerId && restRemaining <= 0) return;
  restRemaining = Math.max(0, restRemaining + delta);
  if (restRemaining === 0) {
    finishRestTimer();
  } else {
    updateTimerDisplay();
  }
}

function closeSheet() {
  stopRestTimer();
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}

function switchTab(el, tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

// ===== GPS TRAIL TRACKER =====
let gpsState = {
  key: null,
  watchId: null,
  points: [],
  startTs: 0,
  pausedMs: 0,
  pauseStart: 0,
  uiTimer: null,
  running: false,
  paused: false,
  frozenDurationSec: null,
  frozenDistanceKm: null,
  frozenPace: null,
};

function haversineKm(a, b) {
  const R = 6371;
  const dLat = (b.lat - a.lat) * Math.PI / 180;
  const dLon = (b.lng - a.lng) * Math.PI / 180;
  const lat1 = a.lat * Math.PI / 180;
  const lat2 = b.lat * Math.PI / 180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return 2 * R * Math.asin(Math.sqrt(h));
}

function calcGpsDistance(points) {
  let km = 0;
  for (let i = 1; i < points.length; i++) km += haversineKm(points[i-1], points[i]);
  return km;
}

function formatGpsTime(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, '0')}`;
}

function formatPace(sec, km) {
  if (!km || km < 0.01) return '--:--';
  const paceSec = sec / km;
  const pm = Math.floor(paceSec / 60);
  const ps = Math.floor(paceSec % 60);
  return `${pm}:${String(ps).padStart(2, '0')}`;
}

function getGpsElapsedSec() {
  if (!gpsState.startTs) return 0;
  let ms = Date.now() - gpsState.startTs - gpsState.pausedMs;
  if (gpsState.paused && gpsState.pauseStart) ms -= (Date.now() - gpsState.pauseStart);
  return Math.max(0, ms / 1000);
}

function updateGpsUI() {
  let dist, sec, pace;
  if (!gpsState.running && gpsState.frozenDurationSec != null) {
    dist = gpsState.frozenDistanceKm ?? calcGpsDistance(gpsState.points);
    sec = gpsState.frozenDurationSec;
    pace = gpsState.frozenPace || formatPace(sec, dist);
  } else {
    dist = calcGpsDistance(gpsState.points);
    sec = getGpsElapsedSec();
    pace = formatPace(sec, dist);
  }
  const timeEl = document.getElementById('gpsTime');
  const distEl = document.getElementById('gpsDist');
  const paceEl = document.getElementById('gpsPace');
  const statusEl = document.getElementById('gpsStatus');
  if (timeEl) timeEl.textContent = formatGpsTime(sec);
  if (distEl) distEl.textContent = Number(dist).toFixed(2);
  if (paceEl) paceEl.textContent = pace;
  if (statusEl) {
    if (gpsState.running && !gpsState.paused) statusEl.textContent = `📍 GPS activo · ${gpsState.points.length} puntos`;
    else if (gpsState.paused) statusEl.textContent = '⏸ GPS en pausa';
    else if (gpsState.points.length) {
      if (gpsState.frozenDurationSec != null) {
        statusEl.textContent = `Última salida: ${Number(gpsState.frozenDistanceKm || 0).toFixed(2)} km · ${gpsState.frozenPace} min/km`;
      } else {
        statusEl.textContent = 'GPS detenido — datos guardados';
      }
    }
    else statusEl.textContent = 'Tocá Iniciar para registrar tu trail con GPS';
  }
  const last = gpsState.points[gpsState.points.length - 1];
  const mapLink = document.getElementById('gpsMapLink');
  if (mapLink && last) {
    mapLink.href = `https://maps.google.com/?q=${last.lat},${last.lng}`;
    mapLink.style.display = 'block';
  }
}

function setGpsButtons(mode) {
  const start = document.getElementById('gpsStartBtn');
  const pause = document.getElementById('gpsPauseBtn');
  const stop = document.getElementById('gpsStopBtn');
  if (!start) return;
  if (mode === 'running') {
    start.style.display = 'none';
    pause.style.display = 'block';
    pause.textContent = '⏸ Pausar';
    stop.style.display = 'block';
  } else if (mode === 'paused') {
    start.style.display = 'none';
    pause.style.display = 'block';
    pause.textContent = '▶ Reanudar';
    stop.style.display = 'block';
  } else {
    start.style.display = 'block';
    pause.style.display = 'none';
    stop.style.display = 'none';
  }
}

function persistGps(key) {
  if (!savedData[key]) savedData[key] = {};
  const dist = calcGpsDistance(gpsState.points);
  const sec = getGpsElapsedSec();
  savedData[key].gps = {
    distanceKm: Math.round(dist * 100) / 100,
    durationSec: Math.round(sec),
    pace: formatPace(sec, dist),
    points: gpsState.points.slice(-300),
    updatedAt: new Date().toISOString(),
    status: gpsState.running ? (gpsState.paused ? 'paused' : 'running') : 'stopped',
  };
  localStorage.setItem('esteban_training', JSON.stringify(savedData));
}

function onGpsPosition(pos) {
  const p = {
    lat: pos.coords.latitude,
    lng: pos.coords.longitude,
    alt: pos.coords.altitude,
    acc: pos.coords.accuracy,
    ts: pos.timestamp,
  };
  const last = gpsState.points[gpsState.points.length - 1];
  if (last && haversineKm(last, p) < 0.003) return;
  gpsState.points.push(p);
  updateGpsUI();
  if (gpsState.key) persistGps(gpsState.key);
}

function onGpsError(err) {
  const statusEl = document.getElementById('gpsStatus');
  if (statusEl) statusEl.textContent = 'Error GPS: ' + (err.message || 'sin permiso');
}

function startGpsUIInterval() {
  if (gpsState.uiTimer) clearInterval(gpsState.uiTimer);
  gpsState.uiTimer = setInterval(updateGpsUI, 1000);
}

function startGps(key) {
  if (!navigator.geolocation) {
    alert('Tu dispositivo no soporta GPS.');
    return;
  }
  if (gpsState.paused && gpsState.key === key) {
    gpsState.pausedMs += Date.now() - gpsState.pauseStart;
    gpsState.pauseStart = 0;
    gpsState.paused = false;
    gpsState.running = true;
    setGpsButtons('running');
    startGpsUIInterval();
    persistGps(key);
    return;
  }
  // Nueva salida: limpiar sesión anterior detenida
  if (!gpsState.running) {
    gpsState.frozenDurationSec = null;
    gpsState.frozenDistanceKm = null;
    gpsState.frozenPace = null;
    gpsState.points = [];
    gpsState.startTs = Date.now();
    gpsState.pausedMs = 0;
    gpsState.pauseStart = 0;
  }
  gpsState.key = key;
  gpsState.running = true;
  gpsState.paused = false;
  if (!gpsState.watchId) {
    gpsState.watchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000,
    });
  }
  setGpsButtons('running');
  startGpsUIInterval();
  updateGpsUI();
  persistGps(key);
}

function pauseGps() {
  if (!gpsState.running) return;
  if (!gpsState.paused) {
    gpsState.paused = true;
    gpsState.pauseStart = Date.now();
    if (gpsState.watchId) {
      navigator.geolocation.clearWatch(gpsState.watchId);
      gpsState.watchId = null;
    }
    setGpsButtons('paused');
  } else {
    gpsState.pausedMs += Date.now() - gpsState.pauseStart;
    gpsState.pauseStart = 0;
    gpsState.paused = false;
    gpsState.watchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError, {
      enableHighAccuracy: true,
      maximumAge: 5000,
      timeout: 15000,
    });
    setGpsButtons('running');
  }
  updateGpsUI();
  if (gpsState.key) persistGps(gpsState.key);
}

function stopGps(key) {
  if (gpsState.watchId) {
    navigator.geolocation.clearWatch(gpsState.watchId);
    gpsState.watchId = null;
  }
  if (gpsState.uiTimer) clearInterval(gpsState.uiTimer);
  gpsState.uiTimer = null;
  gpsState.running = false;
  gpsState.paused = false;
  const dist = calcGpsDistance(gpsState.points);
  const sec = getGpsElapsedSec();
  if (!savedData[key]) savedData[key] = {};
  savedData[key].gps = {
    distanceKm: Math.round(dist * 100) / 100,
    durationSec: Math.round(sec),
    pace: formatPace(sec, dist),
    points: gpsState.points.slice(-300),
    updatedAt: new Date().toISOString(),
    status: 'stopped',
  };
  const timeInput = document.getElementById('w_time');
  if (timeInput && !timeInput.value && sec > 0) {
    const m = Math.round(sec / 60);
    timeInput.value = `${m} min`;
  }
  localStorage.setItem('esteban_training', JSON.stringify(savedData));
  setGpsButtons('idle');
  updateGpsUI();
  showSavedToast(`GPS: ${dist.toFixed(2)} km en ${formatGpsTime(sec)}`);
  gpsState = {
    key: null, watchId: null, points: savedData[key]?.gps?.points || [],
    startTs: 0, pausedMs: 0, pauseStart: 0, uiTimer: null,
    running: false, paused: false,
    frozenDurationSec: Math.round(sec),
    frozenDistanceKm: Math.round(dist * 100) / 100,
    frozenPace: formatPace(sec, dist),
  };
  updateGpsUI();
}

function initGpsUI(key) {
  const saved = (savedData[key] || {}).gps;
  if (saved && saved.status === 'running') {
    gpsState.key = key;
    gpsState.points = saved.points || [];
    gpsState.startTs = Date.now() - (saved.durationSec || 0) * 1000;
    gpsState.running = true;
    startGps(key);
    return;
  }
  if (saved && saved.status === 'stopped') {
    gpsState.points = saved.points || [];
    gpsState.frozenDurationSec = saved.durationSec || 0;
    gpsState.frozenDistanceKm = saved.distanceKm;
    gpsState.frozenPace = saved.pace;
    gpsState.startTs = 0;
    const timeInput = document.getElementById('w_time');
    if (timeInput && !timeInput.value && saved.durationSec) {
      timeInput.value = `${Math.round(saved.durationSec / 60)} min`;
    }
  } else if (saved && saved.points && saved.points.length) {
    gpsState.points = saved.points;
    gpsState.startTs = 0;
  }
  setGpsButtons('idle');
  updateGpsUI();
}

// ===== AI EXPORT (Fase 1) =====
const LIFT_LABELS = {
  snatch: 'Snatch', cleanjerk: 'Clean & jerk', pushjerk: 'Push jerk', olympic: 'Olímpico',
  squat: 'Front squat', deadlift: 'Peso muerto', bench: 'Press de banca',
  pullups: 'Dominadas', military: 'Press militar', dips: 'Fondos',
  calves: 'Gemelos', facepull: 'Facepull',
  acc_legs_a: 'Acc. piernas', acc_legs_b: 'Acc. volumen piernas',
  acc_pull_a: 'Acc. pull', acc_push_a: 'Acc. push',
};

function parseDateKey(key) {
  const [y, m, d] = key.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function labelWeights(weights) {
  if (!weights) return {};
  const out = {};
  for (const [k, v] of Object.entries(weights)) {
    out[LIFT_LABELS[k] || k] = v;
  }
  return out;
}

function sessionHasData(session) {
  return Object.keys(session.activities).length > 0;
}

function buildAISessions() {
  const keys = Object.keys(savedData).sort();
  return keys.map(key => {
    const date = parseDateKey(key);
    const plan = getDayPlan(date);
    const dayData = savedData[key];
    const weekIdx = getWeekNumber(date);
    const comp = dayData.completions || {};
    const session = {
      date: key,
      day: DAYS_ES[date.getDay()],
      week: weekIdx + 1,
      block: getBlockLabel(weekIdx),
      planned: plan ? { type: plan.type, label: plan.label, surf: !!plan.surf } : null,
      activities: {},
    };

    if (comp.surf || (plan?.surf && dayData.surf)) {
      session.activities.surf = { completed: !!comp.surf };
    }
    if (comp.gym || dayData.weights || (dayData.note && plan?.type === 'gym')) {
      session.activities.gym = {
        completed: !!comp.gym,
        label: plan?.label || null,
        weights_kg: dayData.weights || {},
        weights_labeled: labelWeights(dayData.weights),
        set_progress: dayData.setProgress || {},
        notes: dayData.note || null,
      };
    }
    if (comp.trail || dayData.gps || dayData.time || (dayData.note && plan?.type === 'trail')) {
      const trail = getTrailForDate(date);
      session.activities.trail = {
        completed: !!comp.trail,
        label: plan?.label || null,
        route: trail?.name || null,
        planned_km: trail?.km ?? null,
        planned_elevation_m: trail?.desnivel ?? null,
        difficulty: trail?.diffLabel || null,
        time_logged: dayData.time || null,
        gps: dayData.gps ? {
          km: dayData.gps.distanceKm,
          duration_sec: dayData.gps.durationSec,
          pace_min_km: dayData.gps.pace,
        } : null,
        notes: dayData.note || null,
      };
    }
    if (comp.mob || (dayData.note && plan?.type === 'mob')) {
      session.activities.mob = { completed: !!comp.mob, notes: dayData.note || null };
    }
    if (comp.rest || (dayData.note && plan?.type === 'rest')) {
      session.activities.rest = { completed: !!comp.rest, notes: dayData.note || null };
    }
    return session;
  }).filter(sessionHasData);
}

function buildSummaryStats(sessions) {
  let surf = 0, gym = 0, trail = 0, mob = 0;
  for (const s of sessions) {
    if (s.activities.surf?.completed) surf++;
    if (s.activities.gym?.completed) gym++;
    if (s.activities.trail?.completed) trail++;
    if (s.activities.mob?.completed) mob++;
  }
  return { sessions_logged: sessions.length, surf_completed: surf, gym_completed: gym, trail_completed: trail, mobility_completed: mob };
}

function buildAIExportPayload() {
  const sessions = buildAISessions();
  return {
    schema_version: 1,
    format: 'esteban-training-ai',
    exported_at: new Date().toISOString(),
    athlete: { name: 'Esteban', location: 'Uvita, Costa Rica' },
    program_start: localStorage.getItem('esteban_program_start'),
    summary: buildSummaryStats(sessions),
    sessions,
    raw_training: savedData,
  };
}

function formatMdWeights(gym) {
  const labeled = gym.weights_labeled || labelWeights(gym.weights_kg);
  const entries = Object.entries(labeled);
  if (!entries.length) return '';
  return entries.map(([name, kg]) => `${name}: ${kg} kg`).join(' · ');
}

function formatMdLine(session) {
  const lines = [];
  const { date, day, activities: a } = session;
  lines.push(`## ${date} ${day}`);
  if (a.surf) lines.push(`- ${a.surf.completed ? '✅' : '⬜'} Surf mañana`);
  if (a.gym) {
    const w = formatMdWeights(a.gym);
    lines.push(`- ${a.gym.completed ? '✅' : '⬜'} Gym: ${a.gym.label || 'sesión'}${w ? `\n  - Pesos: ${w}` : ''}`);
    if (a.gym.notes) lines.push(`  - Notas: ${a.gym.notes}`);
  }
  if (a.trail) {
    const t = a.trail;
    let detail = t.route || t.label || 'Trail';
    if (t.gps?.km) detail += ` (${t.gps.km} km GPS`;
    if (t.gps?.pace) detail += `, ${t.gps.pace}/km`;
    if (t.gps?.km) detail += ')';
    else if (t.time_logged) detail += ` (${t.time_logged})`;
    lines.push(`- ${t.completed ? '✅' : '⬜'} Trail: ${detail}`);
    if (t.notes) lines.push(`  - Notas: ${t.notes}`);
  }
  if (a.mob) {
    lines.push(`- ${a.mob.completed ? '✅' : '⬜'} Movilidad`);
    if (a.mob.notes) lines.push(`  - Notas: ${a.mob.notes}`);
  }
  if (a.rest) {
    lines.push(`- ${a.rest.completed ? '✅' : '⬜'} Descanso activo`);
    if (a.rest.notes) lines.push(`  - Notas: ${a.rest.notes}`);
  }
  lines.push('');
  return lines.join('\n');
}

function buildAIMarkdown(payload) {
  const { sessions, summary, program_start, exported_at } = payload;
  const weeks = {};
  for (const s of sessions) {
    const w = s.week;
    if (!weeks[w]) weeks[w] = { block: s.block, sessions: [] };
    weeks[w].sessions.push(s);
  }
  let md = `# Entrenamiento — Esteban\n\n`;
  md += `> Exportado: ${exported_at}\n`;
  md += `> Programa iniciado: ${program_start || '—'}\n`;
  md += `> Sesiones registradas: ${summary.sessions_logged} · Surf: ${summary.surf_completed} · Gym: ${summary.gym_completed} · Trail: ${summary.trail_completed}\n\n`;
  md += `---\n\n`;
  md += `## Resumen para AI\n\n`;
  md += `Esteban entrena surf (mañana), gym 3×/sem, trail 2×/sem en Uvita, Costa Rica. `;
  md += `Objetivo: cuerpo atlético, más volumen de piernas, progresión +2.5 kg/semana. `;
  md += `Periodización: Adaptación → Hipertrofia → Fuerza (ciclos de 4 semanas).\n\n`;
  const weekNums = Object.keys(weeks).map(Number).sort((a, b) => a - b);
  for (const w of weekNums) {
    const { block, sessions: wSessions } = weeks[w];
    const first = wSessions[0]?.date || '';
    const last = wSessions[wSessions.length - 1]?.date || '';
    md += `# Semana ${w} — ${block} (${first} → ${last})\n\n`;
    for (const s of wSessions) md += formatMdLine(s);
    md += '\n';
  }
  return md.trim() + '\n';
}

function buildAIJsonl(payload) {
  return payload.sessions.map(s => {
    const row = {
      date: s.date,
      day: s.day,
      week: s.week,
      block: s.block,
      surf: s.activities.surf?.completed || false,
      gym: s.activities.gym?.completed || false,
      trail: s.activities.trail?.completed || false,
      notes: s.activities.gym?.notes || s.activities.trail?.notes || s.activities.mob?.notes || null,
    };
    if (s.activities.gym?.weights_kg) row.weights = s.activities.gym.weights_kg;
    if (s.activities.trail?.gps) row.gps_km = s.activities.trail.gps.km;
    return JSON.stringify(row);
  }).join('\n') + (payload.sessions.length ? '\n' : '');
}

function downloadFile(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportForAI() {
  const stamp = dateKey(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate());
  const payload = buildAIExportPayload();
  const md = buildAIMarkdown(payload);
  const jsonl = buildAIJsonl(payload);
  downloadFile(`entrenamiento-ai-${stamp}.json`, JSON.stringify(payload, null, 2), 'application/json');
  setTimeout(() => downloadFile(`entrenamiento-log-${stamp}.md`, md, 'text/markdown'), 400);
  setTimeout(() => downloadFile(`entrenamiento-log-${stamp}.jsonl`, jsonl, 'text/plain'), 800);
  showSavedToast('3 archivos listos para AI');
}

function exportData() {
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    programStart: localStorage.getItem('esteban_program_start'),
    notifications: localStorage.getItem('esteban_notifications'),
    training: savedData,
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `entrenamiento-esteban-${dateKey(currentDate.getFullYear(), currentDate.getMonth(), currentDate.getDate())}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showSavedToast('Datos exportados');
}

function importData() {
  document.getElementById('importFile').click();
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Formato AI (Fase 1) — restaura desde raw_training
      if (data.raw_training && data.schema_version) {
        savedData = data.raw_training;
        localStorage.setItem('esteban_training', JSON.stringify(savedData));
        if (data.program_start) {
          localStorage.setItem('esteban_program_start', data.program_start);
          programStartDate = new Date(data.program_start + 'T12:00:00');
          initSettings();
        }
        renderCalendar();
        showSavedToast('Importado desde export AI');
        event.target.value = '';
        return;
      }
      if (data.training) {
        savedData = data.training;
        localStorage.setItem('esteban_training', JSON.stringify(savedData));
      }
      if (data.programStart) {
        localStorage.setItem('esteban_program_start', data.programStart);
        programStartDate = new Date(data.programStart + 'T12:00:00');
        initSettings();
      }
      if (data.notifications) {
        localStorage.setItem('esteban_notifications', data.notifications);
        initNotifSettings();
      }
      renderCalendar();
      showSavedToast('Datos importados');
    } catch (err) {
      alert('No se pudo leer el archivo. Verificá que sea un JSON exportado de esta app.');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// Close sheet with Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeSheet();
});

// ===== PWA =====
let deferredInstallPrompt = null;

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById('installBtn');
  if (btn && !isStandalone()) btn.style.display = 'block';
});

async function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  await deferredInstallPrompt.userChoice;
  deferredInstallPrompt = null;
  const btn = document.getElementById('installBtn');
  if (btn) btn.style.display = 'none';
}

function initPWA() {
  if (isStandalone()) return;
  if (isIOS()) {
    const hint = document.getElementById('iosInstallHint');
    if (hint) hint.style.display = 'block';
  }
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
}

// ===== INIT =====
initSettings();
initNotifSettings();
initPWA();
renderCalendar();
</script>
